# Athlete profile: stable context only.
# NEVER put live numbers here (FTP, weight, paces, swim CSS, HRV, training load).
# Those are pulled live from AI Endurance / Garmin. This file is for what no API holds.
# Copy this to profile.local.yaml and fill in your own values. profile.local.yaml is
# gitignored and never shared.

schema_version: 1

identity:
  name:               # your name
  sex:                # male | female | other  (affects physiology models)
  date_of_birth:      # YYYY-MM-DD  (auto-filled from Garmin when enabled, else asked)
  height_cm:          # standing height in cm (stable anthropometry; auto-filled from Garmin when enabled)
  location:           # city / region
  units: metric       # metric | imperial
  timezone:           # e.g. Europe/London

biomechanics:
  leg_length_difference:
    present: false
    shorter_side:           # left | right
    run_correction_mm:      # lift in the run shoe, under the shorter leg
    run_correction_status:  # in_use | trialling | none
    bike_correction_mm:     # shim under the cleat, if any
    bike_correction_status: # in_use | deferred | none
    notes:
  asymmetry:
    side:                   # left | right
    notes:
    pain:                   # none | describe
  cleat:
    system:                 # e.g. shimano_yellow_6deg_float
    angle_adjusted: false
    angle_adjustment_date:
    cue:
  mobility:
    hip_flexion_deg: { right: , left: }
    internal_rotation_deg: { right: , left: }
    hamstrings:             # low | normal
  rehab: []                 # list of ongoing rehab/strength focuses

health:
  conditions: []            # list of { name, status, swim_impact }
  strength_sessions_per_week:
  sleep:                    # free text
  medication:
    # Coach AROUND this only. Drug, dose and timing are the prescriber's call.
    name:
    brand:
    dose:
    dose_day:               # weekday the dose is taken, lowercase, e.g. sunday
    gi_trough_days: []      # weekdays of typical GI trough, e.g. [tuesday, wednesday, thursday]
    implications: []        # coaching implications, free-text list

availability:
  weekly_hours:             # e.g. "11-12"
  weekday_minutes_per_day:
  saturday_hours:
  sunday_hours:
  rest_day:                 # weekday
  fixed_sessions: {}        # map of weekday -> session
  indoor_trainer:
  notes:

equipment:
  devices: []               # watches, head units, scales, straps
  power_meters: []
  power_meter_note:
  # Named bikes with stable kit detail (groupset, crank_length_mm, etc). race_weight_g is the bike
  # AS RACED in GRAMS — weigh it the way you ride it (e.g. with one full bottle) and record the grams.
  # It's kept in grams on purpose: weight in kg is treated as your LIVE bodyweight and rejected here,
  # but a bike's own mass is stable kit data. The coach adds your live weight to it to get total system
  # weight (rider + bike), e.g. to size tyre pressure. Copy this block into profile.local.yaml:
  bikes: {}
  #   felt:
  #     groupset:
  #     crank_length_mm:
  #     race_weight_g: 10000   # bike as raced incl. one bottle = 10 kg (10000 g)
  wetsuit:
  run_shoes:

bike_fit:
  fits: []                  # list of fit records; copy the structure you need
  report_file:              # filename of any fit report PDF in the repo/project

fuelling:
  carb_target_g_per_hour: {}   # e.g. { long: 80, sprint: 0 }
  current_sources: {}
  notes: []
  caffeine:

  # The nutrition you ACTUALLY use — drives the "Fuelling — week ahead" dashboard card and the
  # `fuelling` MCP tool (per-session pre/during/after, only when a session needs it). All values are
  # per SERVING. category is one of: drink_mix | gel | chew | bar | real_food | electrolyte |
  # recovery | nitrate | caffeine | supplement (omit it and it's inferred from the name). timing is
  # any of [pre, during, after, daily] (omit it and it's inferred from the category). These are stable
  # context, never live numbers, so they belong here — gitignored — not in AI Endurance.
  products: []
  #   - name: Beta Fuel Gel
  #     brand: SIS
  #     category: gel
  #     serving: 1 gel (60 ml)
  #     carbs_g: 40
  #     caffeine_mg: 0
  #     timing: [during]
  #   - name: Flapjack
  #     brand: Flapjack Co
  #     category: bar
  #     serving: 1 bar (120 g)
  #     carbs_g: 65
  #     timing: [pre, during]
  #   - name: 5 Electrolytes (Mango)
  #     brand: PowerBar
  #     category: electrolyte
  #     serving: 1 tab in 500 ml
  #     sodium_mg: 200
  #     caffeine_mg: 0
  #   - name: REGO Whey Protein (Chocolate)
  #     brand: SIS
  #     category: recovery
  #     serving: 1 scoop (30 g)
  #     protein_g: 21
  #     carbs_g: 4
  #   - name: Beta-Alanine
  #     brand: XXL Nutrition
  #     category: supplement
  #     serving: 3-5 g/day
  #     timing: [daily]

  # Learned over time (or set by hand). The fuelling review (`fuel_review` MCP tool / dashboard button)
  # suggests values here from your logged outcomes; nothing is auto-written.
  preferences:
    carb_ceiling_g_per_hour:   # your gut-trained per-hour cap — the plan never exceeds it, e.g. 90
    caffeine_cutoff_hour:      # local hour after which to avoid caffeine (steers to caffeine-free), e.g. 16

races:
  # Your own targets. Mirror these into AI Endurance manually: this connector is
  # read-only and cannot set them there.
  - name:
    priority:               # A | B | C
    date:                   # YYYY-MM-DD
    distance:               # sprint | olympic | 70.3 | ironman | other
    target_time:            # e.g. "sub 2:00"
    note:

# Values that must be set directly in AI Endurance (read-only from here). Any non-empty value here
# surfaces on the dashboard's "Set up & improve" card. NOTE: don't add a race-targets reminder — AI
# Endurance has no field for per-race target times; they live in races[].target_time above and the
# coach reads them from there, so the card only shows things that are actionable somewhere.
ai_endurance_todo:
  swim_css:                 # not_set until you set it in AIE
  ftp_w:                    # set/resolve in AIE

# Running list of free-text unresolved actions (e.g. "shim bike cleat after Birmingham"). These also
# surface on the "Set up & improve" card, tagged "discuss with coach"; clear an item once it's done.
open_items: []
